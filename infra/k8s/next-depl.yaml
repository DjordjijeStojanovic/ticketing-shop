apiVersion: apps/v1
kind: Deployment
metadata: 
  name: next-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-client
  template:
    metadata:
      labels:
        app: next-client
    spec:
      containers:
        - name: auth
          #image: us.gcr.io/ticketing-shop-dev/auth
          image: djolestojanovic/next-client
          imagePullPolicy: IfNotPresent
          env:
            - name: jwt_key
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt_key

---

#Cluster IP service

apiVersion: v1 
kind: Service
metadata:
  name: next-client-service
spec:
  selector:
    app: next-client
  ports:
    - name: next-client
      protocol: TCP
      port: 3000
      targetPort: 3000