name: deploy-next-client

on:
  push:
    branches:
      - main
    paths:
      -  'next-client/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: cd next-client && docker build -t djolestojanovic/next-client .
      - run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      - run: docker push djolestojanovic/next-client
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{secrets.DIGITAL_OCEAN_API_KEY}}
      - run: doctl kubernetes cluster kubeconfig save ticketing-shop
      - run: kubectl rollout restart deployment next-depl